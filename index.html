<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="Dashticz 3.20 - a customizable dashboard for Domoticz">
  <meta name="author" content="Dashticz">
  <meta name="theme-color" content="#090b12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="shortcut icon" href="img/favicon/favicon.ico"
    type="image/x-icon" />
  <link rel="apple-touch-icon"
    href="img/favicon/app-icon-192x192.png">
  <link rel="icon" type="image/png"
    href="img/favicon/app-icon-192x192.png" sizes="192x192">
  <link rel="preload" href="img/favicon/app-icon-192x192.png"
    as="image" type="image/png">
  <link rel="stylesheet" type="text/css" href="./dist/bundle.css?v=151">
  <title>Dashticz</title>
</head>

<body id="page-top">
  <div id="loaderHolder" role="status" aria-live="polite"
    aria-label="Dashticz is loading">
    <div class="loaderBackdrop" aria-hidden="true"></div>
    <div class="loaderPanel">
      <div class="loaderLogoShell" aria-hidden="true">
        <span class="loaderOrbit"></span>
        <img class="loaderLogo"
          src="img/favicon/app-icon-192x192.png"
          width="192" height="192" alt="">
      </div>
      <div class="loaderBrand">Dashticz</div>
      <div class="loaderHeader">Your dashboard is starting</div>
      <div class="loaderProgress" aria-hidden="true">
        <span></span>
      </div>
      <div class="loaderStatus">
        Loading<span class="loaderDots" aria-hidden="true"><i></i><i></i><i></i></span>
      </div>
      <div class="loaderVersion">Version 3.20.0</div>
    </div>
  </div>
  <div id="hide" style="display: none">
    <div id="error">Error</div><br>
    For more help, visit the
    <a href="https://dashticz.readthedocs.io/">Dashticz documentation</a>.
  </div>
  <div class="dt-container">
    <div class="contents"></div>
    <div class="swiper-pagination"></div>
  </div>

  <script src="js/loader.js?t=151"></script>
</body>

</html>
